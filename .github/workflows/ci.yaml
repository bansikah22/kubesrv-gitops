name: CD

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to deploy'
        required: true
  workflow_call:
    inputs:
      image_tag:
        description: 'Image tag to deploy'
        required: true
        type: string

jobs:
  update-deployment:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout GitOps repository
        uses: actions/checkout@v3
        with:
          repository: bansikah22/kubesrv-gitops
          token: ${{ secrets.GITOPS_TOKEN }}

      - name: Update deployment file
        uses: mikefarah/yq@v4
        with:
          cmd: yq e '.spec.template.spec.containers[0].image = "bansikah/kubesrv:${{ github.event.inputs.image_tag }}"' -i apps/kubesrv/deployment.yaml

      - name: Commit and push changes
        run: |
          git status
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add apps/kubesrv/deployment.yaml
          git commit -m "Update image to ${{ github.event.inputs.image_tag }}"
          git push