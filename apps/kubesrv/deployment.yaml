apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubesrv
  namespace: default
spec:
  replicas: 4
  selector:
    matchLabels:
      app: kubesrv
  template:
    metadata:
      labels:
        app: kubesrv
    spec:
      containers:
        - name: kubesrv
          image: bansikah/kubesrv:1.2.0
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
